<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<div class="app">
  <div class="header">
    <div class="header-title">Momentum</div>
    <div class="header-date" id="current-date"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value amber" id="stat-today">0</div>
      <div class="stat-sub">completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value amber" id="stat-streak">0</div>
      <div id="streak-badge-wrap"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="stat-best">0</div>
      <div class="stat-sub">days</div>
    </div>
  </div>

  <div class="xp-section">
    <div class="xp-header">
      <span class="xp-label">XP Progress</span>
      <span class="xp-level" id="xp-level-label">Level 1</span>
    </div>
    <div class="xp-bar-bg">
      <div class="xp-bar-fill" id="xp-bar" style="width:0%"></div>
    </div>
    <div class="xp-detail">
      <span class="xp-pts" id="xp-current-pts">0 XP</span>
      <span class="xp-pts" id="xp-next-pts">next level: 100 XP</span>
    </div>
  </div>

  <div class="add-area">
    <div class="input-row">
      <input class="task-input" id="task-input" type="text" placeholder="add a task..." maxlength="80" />
      <button class="priority-btn" id="priority-btn" onclick="cyclePriority()">— none</button>
      <button class="add-btn" onclick="addTask()">+ add</button>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Active</span>
    <span class="section-count" id="active-count">0</span>
  </div>
  <div class="tasks-list" id="active-list"></div>

  <div id="completed-section" style="display:none">
    <div class="divider"></div>
    <div class="section-header">
      <span class="section-title">Completed</span>
      <button class="completed-toggle" onclick="toggleCompleted()">hide</button>
    </div>
    <div class="tasks-list" id="completed-list"></div>
  </div>
  <div id="show-completed-wrap" style="display:none; text-align:center; margin-top:1rem;">
    <button class="completed-toggle" onclick="toggleCompleted()">show completed</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</html>
